name: Check infrastructure

on:
  push:
    paths:
      - "infrastructure/**"
      - ".github/workflows/check-infrastructure.yml"
      - "mise.lock"
  pull_request:
    paths:
      - "infrastructure/**"
      - ".github/workflows/check-infrastructure.yml"
      - "mise.lock"

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install mise and setup
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Workaround for https://github.com/jdx/mise-action/issues/175
      # The asdf:terraform backend installs the binary at the root of the install dir,
      # but mise env reports the /bin subdirectory in PATH. Create a symlink to fix this.
      - name: Fix terraform bin path
        run: |
          INSTALL_DIR=$(find ~/.local/share/mise/installs/terraform -maxdepth 1 -mindepth 1 -type d | head -1)
          mkdir -p "${INSTALL_DIR}/bin"
          ln -sf "${INSTALL_DIR}/terraform" "${INSTALL_DIR}/bin/terraform"

      - name: Fix
        run: mise infra-fmt

      - name: Commit and Push
        uses: 23prime/simple-commit-and-push@15fb653b9591afde3bffb82a906a9af2aede1616 # v1.0.0
        with:
          commit-message: "Auto fix by workflow"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check
        run: mise infra-fmt-check
